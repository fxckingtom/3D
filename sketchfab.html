<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchFab Embedded</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F3F4F6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #4F46E5; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
        
        .sketchfab-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .sketchfab-card h3 {
            margin-top: 0;
            color: #374151;
            font-weight: 600;
        }
        /* 響應式 Iframe 容器 */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 比例 */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <div class="sketchfab-card">
        <h3>Sketchfab Embedded Script Example</h3>
        <p style="color: #6B7280; font-size: 0.9rem; margin-bottom: 20px;">Explore the Military Radio model below</p>
        
        <div class="iframe-container">
            <iframe title="Military Radio" 
                    allowfullscreen 
                    mozallowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    xr-spatial-tracking 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    src="https://sketchfab.com/models/f5c8f0420f054b32a2e977fbcd248d84/embed">
            </iframe>
        </div>
    </div>

</body>
</html>
