<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BabylonJS - Select Model</title>
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F3F4F6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #4F46E5; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
        
        .controls { margin-bottom: 20px; width: 100%; max-width: 500px; }
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            background-color: white;
            color: #374151;
            cursor: pointer;
            outline: none;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        select:focus { border-color: #4F46E5; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2); }

        .viewerContainer {
            background: white;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            height: 500px;
            image-rendering: pixelated;
        }
        babylon { width: 100%; height: 100%; display: block; border-radius: 8px; }
    </style>
    <script>
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                viewer.loadModel(modelUrl)
            }
        }
    </script>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h2>Select a Model to View</h2>
    </div>

    <div class="controls">
        <select onchange="loadit(this.value)">
            <option value="" disabled selected>✨ Please select a model...</option>
            <option value="./models/1.glb">Alice</option>
            <option value="./models/2.glb">Astronaut</option>
            <option value="./models/3.glb">Stacy</option>
        </select>
    </div>

    <div class='viewerContainer'>
        <babylon id="viewerID"></babylon>
    </div>
</body>
</html>
